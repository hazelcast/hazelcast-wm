version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "monthly"
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      # https://github.com/dependabot/dependabot-core/issues/6345#issuecomment-3376986288
      - "/.github/actions/*"
    schedule:
      interval: "monthly"
